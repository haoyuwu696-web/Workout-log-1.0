<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FitLog Pro - 训练模板</title>
<link rel="stylesheet" href="../styles/pages/settings.css"/>
<link rel="stylesheet" href="../styles/output.css"/>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<script src="../scripts/core/app-common.js"></script>
</head>
<body>
<div class="phone-container">
<div class="status-bar">
<span>09:41</span>
<div class="flex gap-1">
<iconify-icon icon="ion:cellular"></iconify-icon>
<iconify-icon icon="ion:wifi"></iconify-icon>
<iconify-icon icon="ion:battery-full"></iconify-icon>
</div>
</div>
<div class="content-area">
<header class="py-6 flex justify-between items-center">
<h1 class="text-3xl font-bold">训练模板</h1>
<a class="text-blue-500 text-sm font-semibold" href="./settings.html">返回</a>
</header>
<div class="card shadow-sm space-y-2">
<input class="bg-gray-100 rounded p-2 text-sm w-full" id="templateNameInput" placeholder="模板名称，例如：练胸日 / 练腿日" type="text"/>
<div class="grid grid-cols-4 gap-2">
<input class="bg-gray-100 rounded p-2 text-sm col-span-3" id="templateExerciseInput" placeholder="输入一个动作，例如：杠铃卧推" type="text"/>
<button class="bg-gray-900 text-white rounded p-2 text-sm font-semibold" id="addExerciseItemBtn" type="button">加动作</button>
</div>
<div class="bg-gray-50 rounded-lg p-2 min-h-[46px]">
<div class="text-xs text-gray-500 mb-1">待创建动作列表</div>
<div class="flex flex-wrap gap-2" id="pendingExerciseList"></div>
</div>
<button class="bg-blue-500 text-white rounded p-2 text-sm font-semibold w-full" id="addTemplateBtn" type="button">创建模板</button>
</div>
<div class="card shadow-sm">
<div class="text-xs text-gray-500 mb-2" id="templateCountText">0 个模板</div>
<div class="space-y-2" id="templateList"></div>
</div>
</div>
<nav class="tab-bar">
<a class="tab-item" href="./index.html"><iconify-icon icon="ion:stats-chart" width="26"></iconify-icon><span>摘要</span></a>
<a class="tab-item" href="./workout.html"><iconify-icon icon="ion:add-circle" width="26"></iconify-icon><span>训练</span></a>
<a class="tab-item" href="./history.html"><iconify-icon icon="ion:calendar" width="26"></iconify-icon><span>历史</span></a>
<a class="tab-item" href="./body.html"><iconify-icon icon="ion:accessibility" width="26"></iconify-icon><span>身体数据</span></a>
<a class="tab-item active" href="./settings.html"><iconify-icon icon="ion:settings" width="26"></iconify-icon><span>设置</span></a>
</nav>
</div>
<script>
  window.FitLogCommon?.initPage();
  const STORAGE_KEY = 'fitlog:workout:templates';
  const templateNameInput = document.getElementById('templateNameInput');
  const templateExerciseInput = document.getElementById('templateExerciseInput');
  const addExerciseItemBtn = document.getElementById('addExerciseItemBtn');
  const pendingExerciseList = document.getElementById('pendingExerciseList');
  const addTemplateBtn = document.getElementById('addTemplateBtn');
  const templateList = document.getElementById('templateList');
  const templateCountText = document.getElementById('templateCountText');
  let pendingExercises = [];

  function readTemplates() {
    try {
      const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      return Array.isArray(raw) ? raw : [];
    } catch {
      return [];
    }
  }

  function writeTemplates(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }

  function renderPendingExercises() {
    if (!pendingExercises.length) {
      pendingExerciseList.innerHTML = '<span class="text-xs text-gray-400">暂未添加动作</span>';
      return;
    }
    pendingExerciseList.innerHTML = pendingExercises
      .map((name, idx) => `
        <button class="bg-white border border-gray-200 text-xs rounded-full px-2 py-1" data-pending-remove-index="${idx}" type="button">
          ${name} ×
        </button>
      `)
      .join('');
    pendingExerciseList.querySelectorAll('[data-pending-remove-index]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const idx = Number(btn.dataset.pendingRemoveIndex);
        pendingExercises.splice(idx, 1);
        renderPendingExercises();
      });
    });
  }

  function addPendingExercise() {
    const name = templateExerciseInput.value.trim();
    if (!name) {
      window.FitLogCommon.showToast('请输入动作名称', 'error');
      return;
    }
    if (pendingExercises.includes(name)) {
      window.FitLogCommon.showToast('该动作已在列表中', 'info');
      return;
    }
    pendingExercises.push(name);
    templateExerciseInput.value = '';
    renderPendingExercises();
  }

  function renderTemplates() {
    const list = readTemplates();
    templateCountText.textContent = `${list.length} 个模板`;
    if (!list.length) {
      window.FitLogCommon.setEmptyState(templateList, '暂无训练模板', '创建第一个', () => templateNameInput.focus());
      return;
    }
    templateList.innerHTML = list
      .map((item, idx) => `
        <div class="bg-gray-50 rounded-lg p-3">
          <div class="flex justify-between items-center">
            <div class="font-semibold text-sm">${item.name || '未命名模板'}</div>
            <button class="text-xs text-red-500 font-semibold" data-remove-index="${idx}" type="button">删除</button>
          </div>
          <div class="text-xs text-gray-500 mt-1">${(item.exercises || []).join('、') || '无动作'}</div>
        </div>
      `)
      .join('');
    templateList.querySelectorAll('[data-remove-index]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const index = Number(btn.dataset.removeIndex);
        const next = readTemplates();
        next.splice(index, 1);
        writeTemplates(next);
        renderTemplates();
      });
    });
  }

  function addTemplate() {
    const name = templateNameInput.value.trim();
    if (!name) {
      window.FitLogCommon.showToast('请输入模板名称', 'error');
      return;
    }
    if (!pendingExercises.length) {
      window.FitLogCommon.showToast('请先逐个添加动作', 'error');
      return;
    }
    const list = readTemplates();
    list.push({
      id: `tpl-${Date.now()}`,
      name,
      exercises: [...pendingExercises],
      createdAt: new Date().toISOString()
    });
    writeTemplates(list);
    templateNameInput.value = '';
    templateExerciseInput.value = '';
    pendingExercises = [];
    renderPendingExercises();
    renderTemplates();
    window.FitLogCommon.showToast('模板已创建', 'success');
  }

  addExerciseItemBtn.addEventListener('click', addPendingExercise);
  addTemplateBtn.addEventListener('click', addTemplate);
  templateExerciseInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') addPendingExercise();
  });
  renderPendingExercises();
  renderTemplates();
</script>
</body>
</html>
