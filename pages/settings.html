<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>

<link rel="stylesheet" href="../styles/pages/settings.css"/>
<link rel="stylesheet" href="../styles/output.css"/>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<script src="../scripts/core/app-common.js"></script>
</head>
<body>
<div class="phone-container">
<div class="status-bar">
<span>09:41</span>
<div class="flex gap-1">
<iconify-icon icon="ion:cellular"></iconify-icon>
<iconify-icon icon="ion:wifi"></iconify-icon>
<iconify-icon icon="ion:battery-full"></iconify-icon>
</div>
</div>
<div class="content-area">
<header class="py-6">
<h1 class="text-3xl font-bold">设置</h1>
</header>
<div class="flex items-center gap-4 bg-white p-4 rounded-xl mb-6 shadow-sm">
<div class="w-16 h-16 bg-gray-200 rounded-full flex items-center justify-center overflow-hidden">
<img alt="User avatar" class="w-full h-full object-cover object-top" src="../that man.jpg"/>
</div>
<div>
<h2 class="text-xl font-bold">健身达人</h2>
<p class="text-sm text-gray-500">2026年3月 加入</p>
</div>
<iconify-icon class="ml-auto text-gray-300" icon="ion:chevron-forward"></iconify-icon>
</div>
<h3 class="text-xs font-semibold text-gray-500 uppercase px-1 mb-2">训练库管理</h3>
<div class="card shadow-sm">
<button class="list-item w-full text-left" id="openCustomExercisesBtn" type="button">
<div class="flex items-center gap-3">
<iconify-icon class="text-blue-500" icon="ion:list" width="22"></iconify-icon>
<span class="text-sm">自定义动作名称录入</span>
</div>
<span class="text-xs text-gray-400" id="customExerciseCountText">0个动作 <iconify-icon icon="ion:chevron-forward"></iconify-icon></span>
</button>
<button class="list-item w-full text-left" id="openWorkoutTemplatesBtn" type="button">
<div class="flex items-center gap-3">
<iconify-icon class="text-orange-500" icon="ion:cube" width="22"></iconify-icon>
<span class="text-sm">我的训练计划模板</span>
</div>
<span class="text-xs text-gray-400" id="workoutTemplateCountText">0个模板 <iconify-icon icon="ion:chevron-forward"></iconify-icon></span>
</button>
</div>
<h3 class="text-xs font-semibold text-gray-500 uppercase px-1 mb-2">系统设置</h3>
<div class="card shadow-sm">
<div class="list-item">
<div class="flex items-center gap-3">
<iconify-icon class="text-indigo-500" icon="ion:moon" width="22"></iconify-icon>
<span class="text-sm">主题偏好</span>
</div>
<select class="text-sm text-blue-500 font-medium bg-transparent" id="themeSelect">
<option value="auto">跟随系统</option>
<option value="light">浅色</option>
<option value="dark">深色</option>
</select>
</div>
<div class="list-item">
<div class="flex items-center gap-3">
<iconify-icon class="text-orange-500" icon="ion:home" width="22"></iconify-icon>
<span class="text-sm">默认首页</span>
</div>
<select class="text-sm text-blue-500 font-medium bg-transparent" id="defaultHomeSelect">
<option value="index">摘要</option>
<option value="workout">训练</option>
<option value="history">历史</option>
<option value="body">身体数据</option>
<option value="settings">设置</option>
</select>
</div>
<div class="list-item">
<div class="flex items-center gap-3">
<iconify-icon class="text-green-500" icon="ion:cloud-upload" width="22"></iconify-icon>
<span class="text-sm">导出数据备份</span>
</div>
<button class="text-xs text-blue-500 font-semibold" id="exportDataBtn" type="button">导出 JSON</button>
</div>
<div class="list-item">
<div class="flex items-center gap-3">
<iconify-icon class="text-sky-500" icon="ion:cloud-download" width="22"></iconify-icon>
<span class="text-sm">导入数据备份</span>
</div>
<button class="text-xs text-blue-500 font-semibold" id="importDataBtn" type="button">导入 JSON</button>
<input accept=".json,application/json" class="hidden" id="importDataInput" type="file"/>
</div>
<div class="list-item">
<div class="flex items-center gap-3 flex-1">
<iconify-icon class="text-amber-500" icon="ion:calendar-clear" width="22"></iconify-icon>
<span class="text-sm">按月份删除数据</span>
</div>
<div class="flex items-center gap-2">
<input class="bg-gray-100 rounded px-2 py-1 text-xs w-28" id="deleteMonthInput" type="month"/>
<button class="text-xs text-amber-600 font-semibold" id="deleteMonthBtn" type="button">删除</button>
</div>
</div>
<div class="list-item">
<div class="flex items-center gap-3">
<iconify-icon class="text-red-500" icon="ion:trash" width="22"></iconify-icon>
<span class="text-sm">清空全部数据</span>
</div>
<button class="text-xs text-red-500 font-semibold" id="clearDataBtn" type="button">清空</button>
</div>
</div>
<div class="text-center py-4">
<p class="text-xs text-gray-400">FitLog Pro v2.4.0 (2026.03.27)</p>
</div>
</div>
<!-- Navigation Tab Bar -->
<nav class="tab-bar">
<a class="tab-item" href="./index.html">
<iconify-icon icon="ion:stats-chart" width="26"></iconify-icon>
<span>摘要</span>
</a>
<a class="tab-item" href="./workout.html">
<iconify-icon icon="ion:add-circle" width="26"></iconify-icon>
<span>训练</span>
</a>
<a class="tab-item" href="./history.html">
<iconify-icon icon="ion:calendar" width="26"></iconify-icon>
<span>历史</span>
</a>
<a class="tab-item" href="./body.html">
<iconify-icon icon="ion:accessibility" width="26"></iconify-icon>
<span>身体数据</span>
</a>
<a class="tab-item active" href="./settings.html">
<iconify-icon icon="ion:settings" width="26"></iconify-icon>
<span>设置</span>
</a>
</nav>
</div>
<script>
  window.FitLogCommon?.initPage();
  const SETTINGS_KEY = 'fitlog:settings';

  const defaultSettings = {
    weightUnit: 'kg',
    reminderTime: '18:00',
    theme: 'auto',
    defaultHome: 'index',
    timerSound: 'on'
  };

  function readSettings() {
    try {
      const raw = localStorage.getItem(SETTINGS_KEY);
      return raw ? { ...defaultSettings, ...JSON.parse(raw) } : { ...defaultSettings };
    } catch {
      return { ...defaultSettings };
    }
  }

  function writeSettings(next) {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(next));
  }

  function exportAllData() {
    const payload = {};
    for (let i = 0; i < localStorage.length; i += 1) {
      const key = localStorage.key(i);
      if (!key || !key.startsWith('fitlog:')) continue;
      const raw = localStorage.getItem(key);
      try {
        payload[key] = JSON.parse(raw);
      } catch {
        payload[key] = raw;
      }
    }

    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `fitlog-backup-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    window.FitLogCommon.showToast('备份文件已下载', 'success');
  }

  function importAllData(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(String(reader.result || '{}'));
        Object.keys(parsed).forEach((key) => {
          if (!key.startsWith('fitlog:')) return;
          const value = parsed[key];
          localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
        });
        window.FitLogCommon.showToast('导入成功，即将刷新页面', 'success');
        setTimeout(() => window.location.reload(), 600);
      } catch {
        window.FitLogCommon.showToast('导入失败：JSON 格式不正确', 'error');
      }
    };
    reader.readAsText(file);
  }

  function clearAllData() {
    const keys = [];
    for (let i = 0; i < localStorage.length; i += 1) {
      const key = localStorage.key(i);
      if (key && key.startsWith('fitlog:')) keys.push(key);
    }
    keys.forEach((key) => localStorage.removeItem(key));
  }

  function showConfirmModal(message, confirmText = '确认') {
    return new Promise((resolve) => {
      const phoneContainer = document.querySelector('.phone-container');
      if (!phoneContainer) {
        resolve(false);
        return;
      }

      const overlay = document.createElement('div');
      overlay.className = 'absolute inset-0 z-[100000] bg-black/45 flex items-center justify-center p-4';
      overlay.innerHTML = `
        <div class="w-full max-w-[320px] bg-white rounded-2xl p-4 shadow-lg">
          <h3 class="text-base font-bold text-gray-900">请确认操作</h3>
          <p class="text-sm text-gray-600 mt-2 leading-6">${message}</p>
          <div class="mt-4 flex gap-3">
            <button type="button" class="w-1/2 py-2 rounded-xl bg-gray-100 text-gray-700 font-semibold touch-target" data-confirm-cancel>
              取消
            </button>
            <button type="button" class="w-1/2 py-2 rounded-xl bg-red-500 text-white font-semibold touch-target" data-confirm-ok>
              ${confirmText}
            </button>
          </div>
        </div>
      `;

      overlay.addEventListener(
        'touchmove',
        (e) => e.preventDefault(),
        { passive: false }
      );

      const cleanup = (result) => {
        overlay.remove();
        resolve(result);
      };

      overlay.querySelector('[data-confirm-cancel]')?.addEventListener('click', () => cleanup(false));
      overlay.querySelector('[data-confirm-ok]')?.addEventListener('click', () => cleanup(true));
      overlay.addEventListener('click', (event) => {
        if (event.target === overlay) cleanup(false);
      });

      phoneContainer.appendChild(overlay);
    });
  }

  const themeSelect = document.getElementById('themeSelect');
  const defaultHomeSelect = document.getElementById('defaultHomeSelect');
  const exportDataBtn = document.getElementById('exportDataBtn');
  const importDataBtn = document.getElementById('importDataBtn');
  const importDataInput = document.getElementById('importDataInput');
  const deleteMonthInput = document.getElementById('deleteMonthInput');
  const deleteMonthBtn = document.getElementById('deleteMonthBtn');
  const clearDataBtn = document.getElementById('clearDataBtn');
  const openCustomExercisesBtn = document.getElementById('openCustomExercisesBtn');
  const openWorkoutTemplatesBtn = document.getElementById('openWorkoutTemplatesBtn');
  const customExerciseCountText = document.getElementById('customExerciseCountText');
  const workoutTemplateCountText = document.getElementById('workoutTemplateCountText');

  const settings = readSettings();
  themeSelect.value = settings.theme;
  defaultHomeSelect.value = settings.defaultHome;
  const customExercises = JSON.parse(localStorage.getItem('fitlog:workout:library') || '[]');
  const workoutTemplates = JSON.parse(localStorage.getItem('fitlog:workout:templates') || '[]');
  deleteMonthInput.value = new Date().toISOString().slice(0, 7);
  customExerciseCountText.innerHTML = `${customExercises.length}个动作 <iconify-icon icon="ion:chevron-forward"></iconify-icon>`;
  workoutTemplateCountText.innerHTML = `${workoutTemplates.length}个模板 <iconify-icon icon="ion:chevron-forward"></iconify-icon>`;

  themeSelect.addEventListener('change', (event) => {
    settings.theme = event.target.value;
    writeSettings(settings);
  });

  defaultHomeSelect.addEventListener('change', (event) => {
    settings.defaultHome = event.target.value;
    writeSettings(settings);
  });

  function removeMonthRecordsByKey(storageKey, monthText) {
    try {
      const raw = JSON.parse(localStorage.getItem(storageKey) || '[]');
      if (!Array.isArray(raw)) return 0;
      const next = raw.filter((item) => !String(item?.date || '').startsWith(monthText));
      const removed = raw.length - next.length;
      if (removed > 0) {
        localStorage.setItem(storageKey, JSON.stringify(next));
      }
      return removed;
    } catch {
      return 0;
    }
  }

  exportDataBtn.addEventListener('click', exportAllData);
  importDataBtn.addEventListener('click', () => {
    importDataInput.click();
  });
  importDataInput.addEventListener('change', (event) => {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    importAllData(file);
    importDataInput.value = '';
  });
  deleteMonthBtn.addEventListener('click', async () => {
    const monthText = String(deleteMonthInput.value || '').trim();
    if (!/^\d{4}-\d{2}$/.test(monthText)) {
      window.FitLogCommon.showToast('请先选择要删除的月份', 'error');
      return;
    }

    const confirmed = await showConfirmModal(`确认删除 ${monthText} 的记录吗？仅删除该月数据。`, '删除');
    if (!confirmed) return;

    let removedCount = 0;
    removedCount += removeMonthRecordsByKey('fitlog:workout:sessions', monthText);
    removedCount += removeMonthRecordsByKey('fitlog:body:records', monthText);
    removedCount += removeMonthRecordsByKey('fitlog:nutrition:daily', monthText);

    const monthReminderPrefix = `fitlog:weight-reminder:${monthText}`;
    const reminderKeys = [];
    for (let i = 0; i < localStorage.length; i += 1) {
      const key = localStorage.key(i);
      if (key && key.startsWith(monthReminderPrefix)) {
        reminderKeys.push(key);
      }
    }
    reminderKeys.forEach((key) => localStorage.removeItem(key));
    removedCount += reminderKeys.length;

    window.FitLogCommon.showToast(
      removedCount > 0 ? `已删除 ${monthText} 的相关数据` : `${monthText} 没有可删除的数据`,
      removedCount > 0 ? 'success' : 'info'
    );
    setTimeout(() => window.location.reload(), 500);
  });
  clearDataBtn.addEventListener('click', async () => {
    const confirmed = await showConfirmModal('确认清空所有本地健身数据吗？此操作不可恢复，建议先导出备份。', '清空');
    if (!confirmed) return;
    clearAllData();
    window.FitLogCommon.showToast('已清空本地数据', 'success');
    setTimeout(() => {
      window.location.href = './index.html';
    }, 400);
  });
  openCustomExercisesBtn.addEventListener('click', () => {
    window.location.href = './custom-exercises.html';
  });
  openWorkoutTemplatesBtn.addEventListener('click', () => {
    window.location.href = './workout-templates.html';
  });
</script>
</body>
</html>
